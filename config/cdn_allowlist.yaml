# ---------------------------------------------------------------------------
# Operator note -- trade-offs in scope:
#
# * AS16509 (Amazon) is listed twice intentionally: once under CDN
#   (CloudFront) and once under platform (Signal, Discord). The
#   registry dedupes at load time on asn; the first match wins.
# * Facebook / Meta owns some IP space registered under transit
#   providers (PCCW, Telia) -- those remain outside this list. If
#   Opus verdicts a Telia-hosted fb.com IP BENIGN at 0.99 it still
#   passes even without the allowlist.
# * Google's quasi-random IP space is mostly under AS15169 but a
#   few services (YouTube in some regions) use AS36040 / AS36384.
#   Add them if you see Opus verdicts dropping on YouTube traffic.
# ---------------------------------------------------------------------------
