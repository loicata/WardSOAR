# WardSOAR - Main Configuration
# Generated by installer — edit as needed

# Network topology
network:
  pfsense_ip: "{{PFSENSE_IP}}"
  pc_ip: "{{PC_IP}}"
  lan_subnet: "{{LAN_SUBNET}}"
  dns_servers:
    - "{{DNS_1}}"
    - "{{DNS_2}}"

# Suricata EVE JSON input
watcher:
  mode: "ssh"
  eve_json_path: "{{EVE_JSON_PATH}}"
  poll_interval_seconds: 2
  min_severity: 3
  ssh:
    remote_eve_path: "{{REMOTE_EVE_PATH}}"

# --- ANTI-FALSE-POSITIVE PIPELINE ---

filter:
  enabled: true
  config_file: "config/known_false_positives.yaml"
  log_suppressed: true

deduplicator:
  enabled: true
  grouping_window_seconds: 60
  max_group_size: 50
  burst_escalation: true

prescorer:
  enabled: true
  mode: "learning"
  min_score_for_analysis: 15
  min_guaranteed_score: 10
  weights:
    severity_1: 40
    severity_2: 25
    severity_3: 10
    ip_known_malicious: 30
    ip_unknown: 10
    multiple_signatures: 20
    suspicious_port: 15
    sysmon_process_match: 25
    outside_business_hours: 10
    burst_alert: 20
  log_all_scores: true

baseline:
  enabled: true
  config_file: "config/network_baseline.yaml"
  anomaly_score_bonus: 15

decision_cache:
  enabled: true
  ttl_benign_seconds: 3600
  ttl_confirmed_seconds: 86400
  ttl_suspicious_seconds: 1800
  ttl_inconclusive_seconds: 600
  max_entries: 10000

# Confirmer section removed in v0.5 (single Opus verdict, no counter-argument).

# --- END ANTI-FALSE-POSITIVE PIPELINE ---

forensics:
  sysmon_channel: "Microsoft-Windows-Sysmon/Operational"
  correlation_window: 300
  max_events: 500
  checks:
    processes: true
    network_connections: true
    dns_cache: true
    arp_cache: true
    sysmon_events: true
    windows_event_logs: true
    registry_persistence: true
    recent_files: true

virustotal:
  enabled: true
  max_file_size: 33554432
  excluded_paths:
    - "C:\\Windows\\System32"
    - "C:\\Program Files"
  hash_first: true
  submit_unknown_files: false

analyzer:
  model: "claude-opus-4-7"
  max_tokens: 4096
  confidence_threshold: 0.7
  full_context: true

responder:
  dry_run: true
  pfsense:
    method: "ssh"
    ssh_user: "{{PFSENSE_SSH_USER}}"
    ssh_key_path: "{{PFSENSE_SSH_KEY}}"
    ssh_port: {{PFSENSE_SSH_PORT}}
    blocklist_table: "blocklist"
  block_duration_hours: 24
  max_blocks_per_hour: 20
  kill_local_process: true
  block_type: "ip"

logging:
  level: "INFO"
  log_dir: "{{INSTALL_DIR}}\\data\\logs"
  decision_log: "decisions.jsonl"
  app_log: "ward_soar.log"
  max_file_size: 10485760
  backup_count: 5

reputation:
  abuseipdb:
    enabled: false
    confidence_threshold: 50
  otx:
    enabled: false

alert_queue:
  max_size: 1000
  overflow_strategy: "drop_lowest"

rule_manager:
  cleanup_interval_minutes: 15
  coherence_check_interval_minutes: 60

forensic_report:
  contact: "loicata.com"
  temp_dir: ""
  include_suspect_files: true
  max_suspect_files_size: 104857600
  include_whois: true

prompts:
  analyzer_system: "config/prompts/analyzer_system.txt"

# --- OPERATIONS & OBSERVABILITY ---

notifier:
  enabled: true
  rate_limit_per_minute: 10
  daily_summary: true
  daily_summary_time: "08:00"
  windows:
    toast_duration_seconds: 10
    sound_critical: true
    tray_tooltip: "WardSOAR"
  email:
    enabled: false
    smtp_host: ""
    smtp_port: 587
    smtp_use_tls: true
    from: "ward@loicata.com"
    to: ""
    events:
      threat_blocked: true
      manual_review_needed: true
      healthcheck_failure: true
      daily_summary: true
  telegram:
    enabled: false
    chat_id: ""
    events:
      threat_blocked: true
      manual_review_needed: true
      healthcheck_failure: true
      daily_summary: false

metrics:
  enabled: true
  flush_interval_seconds: 60
  metrics_log: "metrics.jsonl"

healthcheck:
  enabled: true
  interval_seconds: 300
  disk_warning_threshold_mb: 500
  eve_max_age_seconds: 60
  notify_on_failure: true

# --- MANAGEMENT ---

change_manager:
  max_snapshots: 50
  snapshot_dir: "snapshots"

replay:
  enabled: true
  decision_log_path: "{{INSTALL_DIR}}\\data\\logs\\decisions.jsonl"

# --- DESKTOP APPLICATION ---

app:
  minimize_to_tray: true
  start_minimized: false
  single_instance: true
  save_window_state: true
